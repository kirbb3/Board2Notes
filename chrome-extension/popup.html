<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 360px;
        margin: 0;
        padding: 12px;
        font-size: 13px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
      }
      h2 {
        font-size: 12px;
        margin: 14px 0 4px;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .lecture {
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 8px 10px;
        margin-bottom: 8px;
      }
      .title {
        font-weight: 600;
        margin-bottom: 6px;
        word-break: break-word;
      }
      button {
        display: block;
        width: 100%;
        margin: 4px 0;
        padding: 6px 8px;
        border: 1px solid #bbb;
        border-radius: 5px;
        background: #f7f7f7;
        cursor: pointer;
        font-size: 12px;
        text-align: left;
      }
      button:hover:not(:disabled) {
        background: #e9f2ec;
        border-color: #2e7d32;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .empty {
        color: #777;
        padding: 6px 0;
      }
      .error {
        color: #b00020;
        font-size: 11px;
        margin-top: 4px;
      }
      .status {
        font-size: 11px;
        color: #2e7d32;
        margin: 0 0 4px 2px;
        min-height: 0;
      }
      .status.error {
        color: #b00020;
      }
      .url {
        font-family: monospace;
        font-size: 10px;
        color: #666;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>Lecture Grabber</h1>
    <div id="content"><div class="empty">Scanning this tab…</div></div>
    <script src="popup.js"></script>
  </body>
</html>
