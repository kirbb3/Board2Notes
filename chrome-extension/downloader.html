<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lecture Grabber — HLS download</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 640px;
        margin: 40px auto;
        font-size: 14px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 18px;
      }
      #bar-outer {
        width: 100%;
        height: 14px;
        background: #eee;
        border-radius: 7px;
        overflow: hidden;
        margin: 12px 0;
      }
      #bar {
        height: 100%;
        width: 0;
        background: #2e7d32;
        transition: width 0.2s;
      }
      #status {
        color: #555;
      }
      .error {
        color: #b00020;
        white-space: pre-wrap;
      }
      .note {
        margin-top: 24px;
        padding: 10px 12px;
        background: #f4f7f4;
        border-radius: 6px;
        font-size: 13px;
        color: #444;
      }
      code {
        background: #e8e8e8;
        padding: 1px 4px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <h1 id="title">Downloading lecture…</h1>
    <div id="bar-outer"><div id="bar"></div></div>
    <div id="status">Fetching playlist…</div>
    <div class="note">
      Keep this tab open until the download finishes. The video is saved as a
      <code>.ts</code> file (MPEG transport stream) — every video tool,
      including the processing pipeline, reads it directly. To get a
      <code>.mp4</code> instead, run:<br />
      <code>ffmpeg -i lecture.ts -c copy lecture.mp4</code>
    </div>
    <script src="downloader.js"></script>
  </body>
</html>
